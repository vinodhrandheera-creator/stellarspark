
<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>StellarSpark - Custom Software Solutions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin=""/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#f97316", // Bright Orange
              secondary: "#ea580c", // Darker Orange
              accent: "#fde047", // Yellow/Gold
              darkblue: "#020617",
              "background-light": "#030712",
              "background-dark": "#020617",
              "surface-light": "#0f172a",
              "surface-dark": "#020617",
            },
            fontFamily: {
              display: ['"Plus Jakarta Sans"', 'sans-serif'],
              body: ['"Inter"', 'sans-serif'],
            },
          },
        },
      };
    </script>
    <style>
      body {
        background-color: #020617;
        color: #e2e8f0;
      }
      .clip-hero {
        clip-path: polygon(0 0, 100% 0, 100% 90%, 0 100%);
      }
      @media (max-width: 768px) {
        .clip-hero {
          clip-path: polygon(0 0, 100% 0, 100% 95%, 0 100%);
        }
      }
      .tech-mesh {
        background-image: 
          linear-gradient(to right, rgba(249, 115, 22, 0.05) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(249, 115, 22, 0.05) 1px, transparent 1px);
        background-size: 50px 50px;
      }
      .noise-texture {
        position: fixed;
        inset: 0;
        opacity: 0.03;
        pointer-events: none;
        z-index: 50;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3%3Cfilter id='noiseFilter'%3%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3%3C/filter%3%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3%3C/svg%3%3E");
      }
      .fade-in-up {
        opacity: 0;
        transform: translateY(30px);
        transition: opacity 1s cubic-bezier(0.21, 0.6, 0.35, 1), transform 1s cubic-bezier(0.21, 0.6, 0.35, 1);
      }
      .fade-in-up.visible {
        opacity: 1;
        transform: translateY(0);
      }
      .stagger-1 { transition-delay: 100ms; }
      .stagger-2 { transition-delay: 200ms; }
      .stagger-3 { transition-delay: 300ms; }
      .stagger-4 { transition-delay: 400ms; }
      
      .glass-card {
        background: rgba(15, 23, 42, 0.6);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(249, 115, 22, 0.15);
      }
      
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #020617; }
      ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: #f97316; }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "@google/genai": "https://esm.sh/@google/genai@^1.40.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="antialiased font-body dark">
    <div class="noise-texture"></div>
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
